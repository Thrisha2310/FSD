<!DOCTYPE html>
<html>
<head>
    <title>CSS Color Reference Demo</title>
    <style>
        /* 1. Named Colors */
        .named {
            color: red;
        }

        /* 2. Hexadecimal Colors */
        .hex {
            color: #00ff00; /* bright green */
        }

        /* 3. RGB Colors */
        .rgb {
            color: rgb(0, 0, 255); /* pure blue */
        }

        /* 4. RGBA Colors (with transparency) */
        .rgba {
            color: rgba(255, 165, 0, 0.7); /* semi-transparent orange */
        }

        /* 5. HSL Colors */
        .hsl {
            color: hsl(300, 100%, 50%); /* vivid magenta */
        }

        /* 6. HSLA Colors (with transparency) */
        .hsla {
            color: hsla(180, 100%, 25%, 0.5); /* semi-transparent teal */
        }
    </style>
</head>
<body>
    <h2 class="named">This is a Named Color (red)</h2>
    <h2 class="hex">This is a Hex Color (#00ff00)</h2>
    <h2 class="rgb">This is an RGB Color (0,0,255)</h2>
    <h2 class="rgba">This is an RGBA Color (orange with transparency)</h2>
    <h2 class="hsl">This is an HSL Color (magenta)</h2>
    <h2 class="hsla">This is an HSLA Color (teal with transparency)</h2>
</body>
</html>
