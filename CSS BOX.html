<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Box Model Example</title>
  <style>
    .box {
      width: 300px;
      height: 100px;
      background-color: lightblue; /* Content area */
      
      padding: 20px;   /* iv. Padding: space between content and border */
      border: 5px solid darkblue; /* ii. Border: visible outline around content */
      margin: 30px;    /* iii. Margin: space outside the border */
    }
  </style>
</head>
<body>
  <h2>CSS Box Model Demonstration</h2>
  <div class="box">
    <p>This is the CONTENT inside the box.</p>
  </div>
  <p>
    Notice how the <b>content</b> is inside the box, the <b>padding</b> adds space around it, 
    the <b>border</b> surrounds the padding, and the <b>margin</b> creates space outside the box.
  </p>
</body>
</html>
